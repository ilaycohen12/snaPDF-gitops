# Prod values for the API service — larger resources, more replicas
image:
  repository: 086241318869.dkr.ecr.us-east-1.amazonaws.com/snapdf-api
  tag: latest

replicas: 2

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  path: /api

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

eso:
  enabled: true
  # secrets list intentionally left empty for now — blocked on prod-specific
  # snapdf-prod/db-credentials and snapdf-prod/jwt-secret existing (see
  # documentation.md and snaPDF-infra issue for the "apply prod" work).
  # Reusing dev's snapdf/db-credentials or snapdf/jwt-secret here would be wrong:
  # different RDS instance for the DB creds, and a security issue reusing the
  # same JWT signing key across environments.

serviceAccount:
  roleArn: "arn:aws:iam::086241318869:role/snapdf-prod-worker"

env:
  AUTH_URL: "<prod-ingress-host>/auth"
  DB_NAME: "snapdf"
  SIGNED_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/086241318869/snapdf-prod-signed"
  FREE_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/086241318869/snapdf-prod-free"
  S3_BUCKET: "snapdf-prod-pdfs-086241318869"
