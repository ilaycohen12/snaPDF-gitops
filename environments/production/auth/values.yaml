# Prod values for the auth service
image:
  repository: 086241318869.dkr.ecr.us-east-1.amazonaws.com/snapdf-auth
  tag: latest

replicas: 2

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  path: /auth

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

eso:
  enabled: true
  # secrets list intentionally left empty for now — see api/values.yaml comment;
  # blocked on prod-specific snapdf-prod/db-credentials and snapdf-prod/jwt-secret.

serviceAccount:
  roleArn: "arn:aws:iam::086241318869:role/snapdf-prod-worker"

env:
  API_URL: "<prod-ingress-host>/api"
  DB_NAME: "snapdf"
