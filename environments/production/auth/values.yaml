# Prod values for the auth service
image:
  repository: 086241318869.dkr.ecr.us-east-1.amazonaws.com/snapdf-auth
  tag: latest

replicas: 2

ingress:
  enabled: true
  path: /auth

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

eso:
  enabled: true

env: {}
