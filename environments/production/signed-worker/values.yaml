# Prod values for the signed-worker
image:
  repository: 086241318869.dkr.ecr.us-east-1.amazonaws.com/snapdf-worker
  tag: latest

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

ingress:
  enabled: false

hpa:
  enabled: false

keda:
  enabled: true
  minReplicaCount: 0
  maxReplicaCount: 10
  queueLength: "10"
  queueURL: "https://sqs.us-east-1.amazonaws.com/086241318869/snapdf-prod-signed"

eso:
  enabled: true
  # secrets list intentionally left empty for now — see api/values.yaml comment;
  # blocked on prod-specific snapdf-prod/db-credentials.

serviceAccount:
  roleArn: "arn:aws:iam::086241318869:role/snapdf-prod-worker"

env:
  DB_NAME: "snapdf"
  QUEUE_TYPE: "signed"
  QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/086241318869/snapdf-prod-signed"
  S3_BUCKET: "snapdf-prod-pdfs-086241318869"
