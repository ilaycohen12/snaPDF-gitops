# Dev values for the free-worker
# Fixed 1 pod — no autoscaling, no ingress
image:
  repository: 086241318869.dkr.ecr.us-east-1.amazonaws.com/snapdf-worker
  tag: latest

replicas: 1

ingress:
  enabled: false

hpa:
  enabled: false

keda:
  enabled: false

serviceAccount:
  roleArn: "arn:aws:iam::086241318869:role/snapdf-dev-worker"

env:
  DB_NAME: "snapdf"
  QUEUE_TYPE: "free"
  QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/086241318869/snapdf-dev-free"
  S3_BUCKET: "snapdf-dev-pdfs-086241318869"

eso:
  enabled: true
  secrets:
    - secretKey: DB_HOST
      remoteKey: snapdf/db-credentials
      property: host
    - secretKey: DB_USER
      remoteKey: snapdf/db-credentials
      property: username
    - secretKey: DB_PASSWORD
      remoteKey: snapdf/db-credentials
      property: password
