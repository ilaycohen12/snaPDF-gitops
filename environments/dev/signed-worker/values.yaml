# Dev values for the signed-worker
# KEDA scales based on SQS signed queue depth — 0 to 3 pods
image:
  repository: 086241318869.dkr.ecr.us-east-1.amazonaws.com/snapdf-worker
  tag: 477fe1c6ac0abdec0343e6a7726097e0d333f593

replicas: 1

resources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: 400m
    memory: 512Mi

ingress:
  enabled: false

hpa:
  enabled: false

keda:
  enabled: true
  minReplicaCount: 0
  maxReplicaCount: 3
  cooldownPeriod: 15
  queueLength: "10"
  queueURL: "https://sqs.us-east-1.amazonaws.com/086241318869/snapdf-dev-signed"

serviceAccount:
  roleArn: "arn:aws:iam::086241318869:role/snapdf-dev-worker"

env:
  DB_NAME: "snapdf"
  QUEUE_TYPE: "signed"
  QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/086241318869/snapdf-dev-signed"
  S3_BUCKET: "snapdf-dev-pdfs-086241318869"

eso:
  enabled: true
  secrets:
    - secretKey: DB_HOST
      remoteKey: snapdf/db-credentials
      property: host
    - secretKey: DB_USER
      remoteKey: snapdf/db-credentials
      property: username
    - secretKey: DB_PASSWORD
      remoteKey: snapdf/db-credentials
      property: password
