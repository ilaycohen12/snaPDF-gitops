# Dev values for the API service
# Overrides charts/service/values.yaml defaults

image:
  repository: 086241318869.dkr.ecr.us-east-1.amazonaws.com/snapdf-api
  tag: latest

replicas: 1

ingress:
  enabled: true
  path: /api

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

eso:
  enabled: true

# env vars injected into the pod — TODO: fill queue URLs and DB details after apply
env: {}
