apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: non-prod
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/ilaycohen12/snaPDF-gitops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: dev
    - server: https://kubernetes.default.svc
      namespace: staging
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod
  namespace: argocd
spec:
  sourceRepos:
    - https://github.com/ilaycohen12/snaPDF-gitops.git
  destinations:
    - server: <prod-cluster-endpoint>
      namespace: production
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  syncWindows:
    - kind: deny
      schedule: '* * * * *'
      duration: 1h
      manualSync: true
